<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pigskin Death Count</title>
  <style>
   @font-face{
   font-family: 'Nosifer';
   src:url('./fonts/Nosifer-Regular.ttf') format('truetype');
    }
   @font-face{
   font-family: 'Barrio';
   src:url('./fonts/Barrio-Regular.ttf') format('truetype');
    }
   @font-face{
   font-family: 'FridayNightLights';
   src:url('./fonts/FridayNightLights-l5pe.ttf') format('truetype');
    }
   @font-face{
   font-family: 'TypefaceMarioWorldPixelFilledRegular-Yz84q';
   src:url('./fonts/TypefaceMarioWorldPixelFilledRegular-Yz84q.otf') format('truetype');
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #153d2c, #06130e 70%);
      color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #gameWrap { width: min(100vw, 1100px); padding: 12px; }
    canvas {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0b5f37;
      border: 5px solid #d6b15c;
      border-radius: 16px;
      box-shadow: 0 0 35px rgba(0,0,0,.65);
      display: block;
      image-rendering: pixelated;
    }
    .hint { text-align: center; opacity: .85; margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="gameWrap">
    <canvas id="game" width="1280" height="720"></canvas>
    <div class="hint">Move: Arrow Keys • Pass: P • Tackle: Space • Field Goal: K • Start: Enter</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const W = canvas.width;
    const H = canvas.height;
    const keys = new Set();

    const titleMusic = new Audio("sounds/Melodic Death Metal Backing Track  [ D minor  ].ogg");
    const crowdSound = new Audio("sounds/Football Crowd Sound - High Quality.ogg");
    const victoryMusic = new Audio("sounds/Epic Victory Supporter – Football Anthem (Royalty Free).ogg");
    titleMusic.loop = true;
    crowdSound.loop = true;
    victoryMusic.loop = true;
    titleMusic.volume = 1.00;
    crowdSound.volume = 1.00;
    victoryMusic.volume = 1.00;
    let audioUnlocked = false;
    const rand = (min, max) => Math.random() * (max - min) + min;
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    const QUARTER_LENGTH = 45;
    const MAX_QUARTERS = 4;
    const DRIVES_PER_QUARTER = 4;
    const TD_POINTS = 6;
    const EXTRA_POINT_POINTS = 1;

    const homeUniform = {
      helmet: "#0f172a", helmetStripe: "#38bdf8", jersey: "#1d4ed8",
      jerseyDark: "#1e3a8a", pants: "#e5e7eb", skin: "#f2c199",
      socks: "#93c5fd", outline: "#020617", number: "#ffffff"
    };

    const teams = [
      { name: "Portland Lumberjacks", color: "#8b4513", speed: 2.15, count: 11 },
      { name: "Denver Frostbite", color: "#7dd3fc", speed: 2.30, count: 11 },
      { name: "Vegas Vipers", color: "#a855f7", speed: 2.50, count: 11 },
      { name: "Dallas Ironhorns", color: "#f97316", speed: 2.75, count: 11 },
      { name: "Superbowl: New England Ghosts", color: "#ef4444", speed: 3.00, count: 11 }
    ];

    let state = "title";
    let level = 0;
    let homeScore = 0;
    let awayScore = 0;
    let deaths = 0;
    let quarter = 1;
    let quarterClock = QUARTER_LENGTH;
    let possession = "home"; // home = Brennan offense, away = Brennan defense
    let downsUsed = 0;       // 4 tackles = turnover
    let driveNumber = 1;     // Each quarter has a set number of drives, alternating between the 2 teams
    let lastTime = 0;
    let message = "";
    let messageTime = 0;
    let offense = [];
    let defenders = [];
    let homeDefense = [];
    let particles = [];
    let awayCarrier = null;
    let driveGrace = 0;      // Makes B the only tackler
    let nextLevelToStart = 0; // Used by the between-opponent screen
    let extraPointTeam = null;
    let extraPointTime = 0;
    let extraPointKicked = false;
    let extraPointScoreAwarded = false;
    let extraPointBall = { x: 940, y: 339, startX: 940, startY: 339, targetX: 1195, targetY: 300 };
    let extraPointPlayers = [];
    let kickoffTeam = null;
    let kickoffTime = 0;
    let kickoffOpening = false;
    let kickoffPlayers = [];
    let kickoffBall = { x: 0, y: 0, startX: 0, startY: 0, targetX: 0, targetY: 0 };
    let flashTime = 0; // seconds; used to flash the title-screen button

    const brennanWinImage = new Image();
    brennanWinImage.src = "assets/b.png";
    const trophyImage = new Image();
    trophyImage.src = "assets/trophy.png";
    const winCutscene = { x: -150, targetX: W / 2, time: 0, settled: false };

    const player = {
      x: 160, y: H / 2, r: 20,
      vx: 0, vy: 0, speed: 4.1,
      dashCooldown: 0, dashTime: 0, invuln: 0,
      role: "QB", number: "7", name: "Brennan",
      facing: 1, walkCycle: 0
    };
    
    // Troubleshooting coordinates
    //let lastPlayerX = player.x;
    //let lastPlayerY = player.y;
   
    let controlledPlayer = player;
    let homeBallCarrier = player;

    const ball = { x: 200, y: H / 2, r: 11, held: true };
    const pass = {
      active: false,
      time: 0,
      duration: 0.38,
      fromX: 0,
      fromY: 0,
      toX: 0,
      toY: 0,
      target: null
    };
    const snap = {
      active: false,
      time: 0,
      duration: 0.42,
      fromX: 0,
      fromY: 0,
      toX: 0,
      toY: 0,
      target: null
    };

    // Midfield drive starts
    const MIDFIELD_X = W / 2;
    const OFFENSE_BACKFIELD = 85;
    const DEFENSE_GAP = 75;

    function resetPlayer() {      
      // Seattle defense: Brennan starts further down the field from the QB, to increase difficulty
      if (possession === "home") {
        player.x = MIDFIELD_X - OFFENSE_BACKFIELD;
        player.y = H / 2;
      } else {
        player.x = MIDFIELD_X - DEFENSE_GAP;
        player.y = 167;
      }
      player.vx = 0;
      player.vy = 0;
      player.dashCooldown = 0;
      player.dashTime = 0;
      player.invuln = 1.0;
      player.facing = possession === "home" ? 1 : -1;
      controlledPlayer = player;
      homeBallCarrier = player;
      pass.active = false;
      ball.held = false;
    }

    function buildOffenseFormation(anchor) {
      // Formation belongs to whoever has the ball    
      const dir = possession === "home" ? 1 : -1;
      const ballCarrier = anchor || player;
      offense = [
        { role: "LT", number: "71", baseX: -62 * dir, baseY: -62, block: 0 },
        { role: "LG", number: "66", baseX: -42 * dir, baseY: -32, block: 0 },
        { role: "C",  number: "55", baseX: -22 * dir, baseY: 40,   block: 0 },
        { role: "RG", number: "64", baseX: -42 * dir, baseY: 32,  block: 0 },
        { role: "RT", number: "78", baseX: -62 * dir, baseY: 62,  block: 0 },
        { role: "WR", number: "11", baseX: 12 * dir,  baseY: -128, block: 0 },
        { role: "WR", number: "18", baseX: 12 * dir,  baseY: 128,  block: 0 },
        { role: "WR", number: "25", baseX: 12 * dir,  baseY: 100,  block: 0 },
        { role: "RB", number: "24", baseX: -92 * dir, baseY: 20,   block: 0 },
        { role: "RB", number: "44", baseX: -72 * dir, baseY: 0,   block: 0 }
      ].map(m => ({
        ...m,
        x: ballCarrier.x + m.baseX,
        y: ballCarrier.y + m.baseY,
        r: 20,
        vx: 0,
        vy: 0,
        speed: 3.85,
        dashCooldown: 0,
        dashTime: 0,
        invuln: 0.4,
        facing: dir,
        walkCycle: rand(0, 4)
      }));
    }

    function updateOffense(dt, anchor, moving) {
      for (const mate of offense) {
        mate.block = Math.max(0, mate.block - dt);
        if (mate === anchor) continue;
        const targetX = anchor.x + mate.baseX;
        const targetY = anchor.y + mate.baseY;
        mate.x += (targetX - mate.x) * 0.12;
        mate.y += (targetY - mate.y) * 0.12;
        if (moving) mate.walkCycle = (mate.walkCycle || 0) + dt * 10;
      }
    }


    function getSnapTarget() {
      return possession === "home" ? homeBallCarrier : awayCarrier;
    }

    function findCenter() {
      return offense.find(mate => mate.role === "C") || offense[2] || getSnapTarget();
    }

    function beginSnap() {
      const target = getSnapTarget();
      if (!target) return;
      const center = findCenter();
      ball.held = false;
      snap.active = true;
      snap.time = 0;
      snap.target = target;
      snap.fromX = center.x;
      snap.fromY = center.y;
      snap.toX = target.x - (possession === "home" ? 22 : -22);
      snap.toY = target.y + 2;
      ball.x = snap.fromX;
      ball.y = snap.fromY;
      driveGrace = 1.25;
    }

    function updateSnap(dt) {
      if (!snap.active) return false;
      snap.time += dt;
      const t = clamp(snap.time / snap.duration, 0, 1);
      const arc = Math.sin(t * Math.PI) * 16;
      const target = snap.target || getSnapTarget();
      if (target) {
        snap.toX = target.x - (possession === "home" ? 22 : -22);
        snap.toY = target.y + 2;
      }
      ball.x = snap.fromX + (snap.toX - snap.fromX) * t;
      ball.y = snap.fromY + (snap.toY - snap.fromY) * t - arc;
      if (t >= 1) {
        snap.active = false;
        ball.held = true;
        spawnParticles(ball.x, ball.y, 4);
      }
      return true;
    }
    
    // Seattle defense midfield
    function buildHomeDefense() {
      const lineX = MIDFIELD_X - DEFENSE_GAP;
      const secondLevelX = MIDFIELD_X - 150;
      const safetyX = MIDFIELD_X - 235;

      homeDefense = [
        { role: "DE", number: "91", x: lineX,         y: H / 2 - 145, speed: 2.65, stun: 0, walkCycle: rand(0, 4) },
        { role: "DT", number: "93", x: lineX - 25,    y: H / 2 - 55,  speed: 2.35, stun: 0, walkCycle: rand(0, 4) },
        { role: "DT", number: "97", x: lineX - 25,    y: H / 2 + 55,  speed: 2.35, stun: 0, walkCycle: rand(0, 4) },
        { role: "DE", number: "99", x: lineX,         y: H / 2 + 145, speed: 2.65, stun: 0, walkCycle: rand(0, 4) },
        { role: "LB", number: "56", x: secondLevelX,  y: H / 2,       speed: 2.95, stun: 0, walkCycle: rand(0, 4) },
        { role: "LB", number: "58", x: secondLevelX,  y: H / 2 + 105, speed: 2.85, stun: 0, walkCycle: rand(0, 4) },
        { role: "CB", number: "21", x: secondLevelX,  y: H / 2 - 205, speed: 3.05, stun: 0, walkCycle: rand(0, 4) },
        { role: "CB", number: "23", x: secondLevelX,  y: H / 2 + 205, speed: 3.05, stun: 0, walkCycle: rand(0, 4) },
        { role: "S",  number: "31", x: safetyX,       y: H / 2 - 65,  speed: 3.1,  stun: 0, walkCycle: rand(0, 4) },
        { role: "S",  number: "33", x: safetyX,       y: H / 2 + 65,  speed: 3.1,  stun: 0, walkCycle: rand(0, 4) }
      ];
    }

    function updateHomeDefense(dt) {
      if (!awayCarrier) return;

      for (const mate of homeDefense) {
        mate.stun = Math.max(0, mate.stun - dt);
        mate.walkCycle += dt * 10;
        if (mate.stun > 0) continue;

        const spreadY = mate.role === "CB"
          ? (mate.y < H / 2 ? -38 : 38)
          : mate.role === "S"
            ? (mate.y < H / 2 ? -18 : 18)
            : 0;

        const ax = awayCarrier.x - mate.x;
        const ay = (awayCarrier.y + spreadY) - mate.y;
        const alen = Math.hypot(ax, ay) || 1;
        mate.x += (ax / alen) * mate.speed;
        mate.y += (ay / alen) * mate.speed;
        mate.x = clamp(mate.x, 45, W - 45);
        mate.y = clamp(mate.y, 85, H - 35);

        // When Seattle is on defense, only Brennan can tackle
        const pressureDist = Math.hypot(mate.x - awayCarrier.x, mate.y - awayCarrier.y);
        if (driveGrace <= 0 && pressureDist < 32) {
          mate.stun = 0.25;
          const pushX = (mate.x - awayCarrier.x) / (pressureDist || 1);
          const pushY = (mate.y - awayCarrier.y) / (pressureDist || 1);
          mate.x += pushX * 14;
          mate.y += pushY * 14;
          spawnParticles(mate.x, mate.y, 3);
        }
      }
    }

    function startLevel(index) {
      level = index;
      homeScore = 0;
      awayScore = 0;
      quarter = 1;
      quarterClock = QUARTER_LENGTH;
      possession = "home";
      downsUsed = 0;
      driveNumber = 1;
      deaths = 0;
      message = "";
      messageTime = 0;
      extraPointTeam = null;
      extraPointPlayers = [];
      extraPointKicked = false;
      extraPointScoreAwarded = false;
      beginKickoff("away", true);
    }

    function clearFieldForTextScreen() {
      offense = [];
      defenders = [];
      homeDefense = [];
      particles = [];
      awayCarrier = null;
      controlledPlayer = player;
      homeBallCarrier = player;
      pass.active = false;
      ball.held = false;
      extraPointPlayers = [];
      extraPointTeam = null;
      kickoffPlayers = [];
      kickoffTeam = null;
    }

    function beginWinCutscene() {
      clearFieldForTextScreen();
      winCutscene.x = -150;
      winCutscene.time = 0;
      winCutscene.settled = false;
    }

      
    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      // If the player clicks/presses a non-Enter key, start title music
      if (state === "title") {
        titleMusic.play().catch(() => {});
      }
    }

    function playTitleMusic() {
      crowdSound.pause();
      crowdSound.currentTime = 0;
      if (audioUnlocked) titleMusic.play().catch(() => {});
    }
    
    function playCrowdSound() {
      titleMusic.pause();
      victoryMusic.pause();
      titleMusic.currentTime = 0;
      if (audioUnlocked) crowdSound.play().catch(() => {});
    }
    
    function playVictoryMusic() {
      crowdSound.pause();
      crowdSound.currentTime = 0;
      if (audioUnlocked) victoryMusic.play().catch(() => {});
    }

    function stopAllAudio() {
      titleMusic.pause();
      crowdSound.pause();
      victoryMusic.pause();
    }
    
    function playVictoryMusic() {
      crowdSound.pause();
      crowdSound.currentTime = 0;
      if (audioUnlocked) victoryMusic.play().catch(() => {});
    }

    function startGame() {
      playCrowdSound();
      if (state === "between") {
        startLevel(nextLevelToStart);
      } else {
        startLevel(0);
      }
    }

    function setupDrive() {
      resetPlayer();
      driveGrace = 1.25;
      defenders = [];
      homeDefense = [];
      awayCarrier = null;
      const team = teams[level];

      if (possession === "home") {
        buildOffenseFormation(player);
        for (let i = 0; i < team.count; i++) {
          defenders.push({
            x: rand(MIDFIELD_X + 65, MIDFIELD_X + 340), y: rand(100, 620), r: 19,
            speed: team.speed + rand(-0.2, 0.35), stun: 0,
            color: team.color, number: String(20 + i), walkCycle: rand(0, 6)
          });
        }
      } else {
        awayCarrier = {
          x: MIDFIELD_X + OFFENSE_BACKFIELD, y: H / 2, r: 20,
          speed: teams[level].speed + 0.35, stun: 0,
          color: team.color, number: "12", walkCycle: rand(0, 6),
          role: "QB"
        };
        buildOffenseFormation(awayCarrier);
        buildHomeDefense();         
      }

      beginSnap();
    }

    function endDrive(reason) {
      downsUsed = 0;
      quarterClock = QUARTER_LENGTH;
     
      if (driveNumber < DRIVES_PER_QUARTER) {
        driveNumber++;
        possession = possession === "home" ? "away" : "home";
        const nextTeam = possession === "home" ? "Seattle" : teams[level].name;
        message = reason ? `${reason} ${nextTeam} ball.` : `${nextTeam} takes over.`;
        messageTime = 1.9;
        setupDrive();
        return;
      }

      if (quarter < MAX_QUARTERS) {
        quarter++;
        possession = "home";
        driveNumber = 1;
        message = reason ? `${reason} Start of Q${quarter}.` : `Start of Q${quarter}. Seattle ball.`;
        messageTime = 2.1;
        setupDrive();
        return;
      }

      finishGame();
    }

    function scoreTouchdown(team) {
      if (team === "home") {
        homeScore += TD_POINTS;
      } else {
        awayScore += TD_POINTS;
      }
      beginExtraPoint(team);
    }

    function beginExtraPoint(team) {
      state = "extraPoint";
      extraPointTeam = team;
      extraPointTime = 0;
      extraPointKicked = false;
      extraPointScoreAwarded = false;
      pass.active = false;
      snap.active = false;
      ball.held = false;
      offense = [];
      defenders = [];
      homeDefense = [];
      awayCarrier = null;

      const homeAttempt = team === "home";
      extraPointBall = homeAttempt
        ? { x: 970, y: 339, startX: 970, startY: 339, targetX: 1210, targetY: 300 }
        : { x: 230, y: 270, startX: 230, startY: 270, targetX: 55, targetY: 225 };
      extraPointPlayers = homeAttempt
        ? [
            { x: 940, y: 339, number: "7", team: "home", facing: 1 },
            { x: 1122, y: 100, number: "31", team: "away", facing: -1 },
            { x: 1122, y: 150, number: "33", team: "away", facing: -1 },
            { x: 1122, y: 200, number: "23", team: "away", facing: -1 },
      	    { x: 1122, y: 250, number: "21", team: "away", facing: -1 },
            { x: 1122, y: 300, number: "58", team: "away", facing: -1 },
            { x: 1122, y: 400, number: "56", team: "away", facing: -1 },
            { x: 1122, y: 500, number: "99", team: "away", facing: -1 },
            { x: 1122, y: 600, number: "97", team: "away", facing: -1 },
            { x: 1122, y: 700, number: "93", team: "away", facing: -1 },
            { x: 1122, y: 800, number: "91", team: "away", facing: -1 }
          ]
        : [
            { x: 260, y: 270, number: "12", team: "away", facing: -1 },
            { x: 171, y: -108, number: "31", team: "home", facing: 1 },
            { x: 171, y: -8, number: "33", team: "home", facing: 1 },
            { x: 171, y: 92, number: "23", team: "home", facing: 1 },
      	    { x: 171, y: 192, number: "21", team: "home", facing: 1 },
            { x: 171, y: 292, number: "58", team: "home", facing: 1 },
            { x: 171, y: 392, number: "56", team: "home", facing: 1 },
            { x: 171, y: 492, number: "99", team: "home", facing: 1 },
            { x: 171, y: 592, number: "97", team: "home", facing: 1 },
            { x: 171, y: 692, number: "93", team: "home", facing: 1 },
            { x: 171, y: 792, number: "91", team: "home", facing: 1 }
          ];
      message = homeAttempt  
        ? "TOUCHDOWN SEATTLE! Press K to kick the extra point!"
        : `TOUCHDOWN ${teams[level].name}! Extra-point attempt...`;
      messageTime = 99;
    }

    function kickExtraPoint() {
      if (state !== "extraPoint" || extraPointTeam !== "home" || extraPointKicked) return;
      extraPointKicked = true;
      extraPointTime = 0;
      extraPointScoreAwarded = false;
      message = "KICK IS UP!";
    }

    function finishExtraPoint() {
      const scoringTeam = extraPointTeam;
      extraPointTeam = null;
      extraPointPlayers = [];
      messageTime = 0;
      beginKickoff(scoringTeam, false);
    }

    function updateExtraPoint(dt) {
      extraPointTime += dt;

      // The away team always kicks automatically and misses wide/high.
      if (extraPointTeam === "away" && !extraPointKicked && extraPointTime >= 0.8) {
        extraPointKicked = true;
        extraPointTime = 0;
        message = "NO GOOD!";
      }

      if (!extraPointKicked) return;
      const t = clamp(extraPointTime / 1.05, 0, 1);
      const arc = Math.sin(t * Math.PI) * 150;
      extraPointBall.x = extraPointBall.startX + (extraPointBall.targetX - extraPointBall.startX) * t;
      extraPointBall.y = extraPointBall.startY + (extraPointBall.targetY - extraPointBall.startY) * t - arc;

      // Award Seattle's point only when the ball reaches the goalpost.
      if (
        extraPointTeam === "home" &&
        extraPointTime >= 1.05 &&
        !extraPointScoreAwarded
      ) {
        extraPointScoreAwarded = true;
        homeScore += EXTRA_POINT_POINTS;
        message = "KICK IS GOOD! +1 SEATTLE";
      }

      if (extraPointTime >= 1.45) finishExtraPoint();
    }

    function beginKickoff(kickingTeam, opening = false) {
      state = "kickoff";
      kickoffTeam = kickingTeam;
      kickoffTime = 0;
      kickoffOpening = opening;
      pass.active = false;
      snap.active = false;
      ball.held = false;
      offense = [];
      defenders = [];
      homeDefense = [];
      awayCarrier = null;

      const homeKicks = kickingTeam === "home";
      const kickerX = homeKicks ? 330 : W - 330;
      const receiveX = homeKicks ? W - 205 : 205;
      const direction = homeKicks ? 1 : -1;
      kickoffBall = {
        x: kickerX + direction * 28, y: H / 2,
        startX: kickerX + direction * 28, startY: H / 2,
        targetX: receiveX, targetY: H / 2 + 35
      };

      kickoffPlayers = [];
      for (let i = 0; i < 11; i++) {
        kickoffPlayers.push({
          x: kickerX - direction * (i === 5 ? 0 : 38),
          y: 105 + i * 51,
          number: String(i === 5 ? 3 : 20 + i),
          team: kickingTeam,
          facing: direction,
          walkCycle: i
        });
        kickoffPlayers.push({
          x: receiveX + direction * (i === 5 ? 0 : 72 + (i % 2) * 35),
          y: 105 + i * 51,
          number: String(i === 5 ? 24 : 40 + i),
          team: homeKicks ? "away" : "home",
          facing: -direction,
          walkCycle: i + 0.5
        });
      }
      message = opening
        ? `${teams[level].name} KICKS OFF TO SEATTLE!`
        : `${homeKicks ? "SEATTLE" : teams[level].name} KICKS OFF!`;
      messageTime = 99;
    }

    function updateKickoff(dt) {
      kickoffTime += dt;
      const homeKicks = kickoffTeam === "home";
      const direction = homeKicks ? 1 : -1;
      const flightStart = 0.65;
      const flightDuration = 1.75;
      const t = clamp((kickoffTime - flightStart) / flightDuration, 0, 1);

      if (kickoffTime >= flightStart) {
        const arc = Math.sin(t * Math.PI) * 190;
        kickoffBall.x = kickoffBall.startX + (kickoffBall.targetX - kickoffBall.startX) * t;
        kickoffBall.y = kickoffBall.startY + (kickoffBall.targetY - kickoffBall.startY) * t - arc;
        for (const p of kickoffPlayers) {
          p.walkCycle += dt * 12;
          if (p.team === kickoffTeam) p.x += direction * 145 * dt;
          else p.x -= direction * 42 * dt;
        }
      }

      if (kickoffTime >= 2.75) {
        const receivingTeam = kickoffTeam === "home" ? "away" : "home";
        kickoffPlayers = [];
        kickoffTeam = null;
        state = "play";
        if (kickoffOpening) {
          kickoffOpening = false;
          possession = receivingTeam;
          message = "Seattle receives the opening kickoff!";
          messageTime = 1.9;
          setupDrive();
        } else {
          endDrive(`${receivingTeam === "home" ? "Seattle" : teams[level].name} receives the kickoff!`);
        }
      }
    }
    
    function registerTackle(teamOnOffense) {
      downsUsed++;
      const tackledCarrier = teamOnOffense === "home" ? homeBallCarrier : awayCarrier;
      spawnParticles(tackledCarrier.x, tackledCarrier.y, 18);

      if (teamOnOffense === "home") deaths++;

      if (downsUsed >= 4) {
        endDrive("Turnover on downs!");
        return;
      }

      message = `${downsUsed + 1}${ordinal(downsUsed + 1)} down. ${4 - downsUsed} tackle${4 - downsUsed === 1 ? "" : "s"} left.`;
      messageTime = 1.4;
      beginSnap();
      messageTime = 1.25;
      setupDrive();
    }

    function ordinal(n) {
      if (n === 1) return "st";
      if (n === 2) return "nd";
      if (n === 3) return "rd";
      return "th";
    }

    function finishGame() {
      if (homeScore > awayScore) {
        if (level >= teams.length - 1) {
          beginWinCutscene();
          state = "win";
        } else {
          nextLevelToStart = level + 1;
          clearFieldForTextScreen();
          stopAllAudio();
          state = "between";
        }
      } else {
        clearFieldForTextScreen();
        state = "gameover";
      }
    }

    function drawShadow(x, y, size = 1) {
      ctx.fillStyle = "rgba(0,0,0,.35)";
      ctx.beginPath();
      ctx.ellipse(x, y + 24 * size, 22 * size, 7 * size, 0, 0, Math.PI * 2);

    // draws B and teammates
    function drawFootballPlayer(p, uniform, options = {}) {
      const scale = options.scale || 1;
      const isMoving = options.moving || false;
      const isStar = options.star || false;
      const isDefender = options.defender || false;

      const legKick = isMoving ? (frame === 0 ? -3 : 3) : 0;
      const armKick = isMoving ? -legKick : 0;

      ctx.save();
      ctx.translate(Math.round(p.x), Math.round(p.y));

      const o = uniform.outline;

      px(11, -7 - armKick, 6, 13, jersey);

      px(-10, 9, 20, 8, pants);

      px(-9, 27 + legKick, 7, 5, uniform.socks || "#ffffff");
      px(2, 27 - legKick, 7, 5, uniform.socks || "#ffffff");
      px(-11, 31 + legKick, 10, 4, o);

      ctx.fillStyle = uniform.number || "#ffffff";

    // draws ball

    function drawTextScreen(title, subtitle, footer) {
      drawField();
      ctx.fillStyle = "#d60000";
      ctx.shadowColor = "#ff0000";
      ctx.shadowBlur = 20;
      ctx.font = "68px Nosifer";

    }

    function wrapText(text, x, y, maxWidth, lineHeight) {
      const words = text.split(" ");
      let line = "";
      for (const word of words) {
        const test = line + word + " ";
        if (ctx.measureText(test).width > maxWidth) {
          ctx.fillText(line, x, y);
          line = word + " ";
          y += lineHeight;
        } else line = test;
      }
      ctx.fillText(line, x, y);
    }

    function nearestSeattleReceiver() {
      if (possession !== "home" || snap.active || pass.active) return null;
      let nearest = null;
      let nearestDistance = Infinity;
      for (const mate of offense) {
        if (mate === homeBallCarrier) continue;
        // Linemen can still block
        if (!["WR", "RB"].includes(mate.role)) continue;
        const distance = Math.hypot(mate.x - homeBallCarrier.x, mate.y - homeBallCarrier.y);
        if (distance < nearestDistance) {
          nearestDistance = distance;
          nearest = mate;
        }
      }
      return nearest;
    }

    function passBall() {
      const target = nearestSeattleReceiver();
      if (!target || !ball.held) return;
      pass.active = true;
      pass.time = 0;
      pass.target = target;
      pass.fromX = homeBallCarrier.x + 23;
      pass.fromY = homeBallCarrier.y + 2;
      pass.toX = target.x + 23;
      pass.toY = target.y + 2;
      ball.held = false;
      message = `PASS TO ${target.role} #${target.number}!`;
      messageTime = 0.75;
    }

    function updatePass(dt) {
      if (!pass.active) return false;
      pass.time += dt;
      const t = clamp(pass.time / pass.duration, 0, 1);
      const arc = Math.sin(t * Math.PI) * 28;
      if (pass.target) {
        pass.toX = pass.target.x + 23;
        pass.toY = pass.target.y + 2;
      }
      ball.x = pass.fromX + (pass.toX - pass.fromX) * t;
      ball.y = pass.fromY + (pass.toY - pass.fromY) * t - arc;
      if (t >= 1 && pass.target) {
        pass.active = false;
        homeBallCarrier = pass.target;
        controlledPlayer = pass.target;
        controlledPlayer.invuln = Math.max(controlledPlayer.invuln || 0, 0.5);
        ball.held = true;
        spawnParticles(ball.x, ball.y, 8);
      }
      return true;
    }

    function updateBrennanBlocker(dt) {
      // Completing a pass
      if (possession !== "home" || homeBallCarrier === player || pass.active || snap.active) return;

      const targetX = homeBallCarrier.x - 62;
      const targetY = homeBallCarrier.y + (player.y < homeBallCarrier.y ? -42 : 42);
      const bx = targetX - player.x;
      const by = targetY - player.y;
      const blen = Math.hypot(bx, by) || 1;
      player.vx = (bx / blen) * Math.min(player.speed * 0.9, blen * 0.12);
      player.vy = (by / blen) * Math.min(player.speed * 0.9, blen * 0.12);
      player.x += player.vx;
      player.y += player.vy;
      player.x = clamp(player.x, 35, W - 40);
      player.y = clamp(player.y, 85, H - 35);
      if (Math.abs(player.vx) > 0.1) player.facing = Math.sign(player.vx);
      if (Math.abs(player.vx) + Math.abs(player.vy) > 0.1) player.walkCycle += dt * 12;
    }

    function updateHomeOffense(dt) {
      updateBrennanBlocker(dt);
      for (const d of defenders) {
        d.stun = Math.max(0, d.stun - dt);
        d.walkCycle += dt * 10;
        if (d.stun <= 0) {
          const ax = homeBallCarrier.x - d.x;
          const ay = homeBallCarrier.y - d.y;
          const alen = Math.hypot(ax, ay) || 1;
          d.x += (ax / alen) * d.speed;
          d.y += (ay / alen) * d.speed;
        }

        const blockers = homeBallCarrier === player ? offense : [...offense, player];
        for (const mate of blockers) {
          if (mate === homeBallCarrier) continue;
          const mdist = Math.hypot(mate.x - d.x, mate.y - d.y);
          if (mdist < 31 && (mate.block || 0) <= 0 && d.stun <= 0) {
            d.stun = 0.55;
            mate.block = 0.65;
            const pushX = (d.x - mate.x) / (mdist || 1);
            const pushY = (d.y - mate.y) / (mdist || 1);
            d.x += pushX * 24;
            d.y += pushY * 24;
            spawnParticles(d.x, d.y, 5);
          }
        }

        const dist = Math.hypot(homeBallCarrier.x - d.x, homeBallCarrier.y - d.y);
        if (driveGrace <= 0 && dist < homeBallCarrier.r + d.r) {
          if (homeBallCarrier.dashTime > 0) {
            d.stun = 1.4;
            const pushX = (d.x - homeBallCarrier.x) / (dist || 1);
            const pushY = (d.y - homeBallCarrier.y) / (dist || 1);
            d.x += pushX * 50;
            d.y += pushY * 50;
            spawnParticles(d.x, d.y, 10);
          } else if ((homeBallCarrier.invuln || 0) <= 0) {
            registerTackle("home");
            return;
          }
        }
      }

      if (homeBallCarrier.x > W - 130) scoreTouchdown("home");
    }

    // B tackles QB    
    function tryBrennanTackle() {
      if (state !== "play" || possession !== "away" || !awayCarrier || snap.active || pass.active || driveGrace > 0) {
        return false;
      }

      const dist = Math.hypot(player.x - awayCarrier.x, player.y - awayCarrier.y);
      const tackleRange = player.r + awayCarrier.r + 18;

      if (dist <= tackleRange) {
        message = "BRENNAN MAKES THE TACKLE!";
        messageTime = 1.2;
        registerTackle("away");
        return true;
      }

      message = "Too far away! Get Brennan closer to the QB!";
      messageTime = 0.8;
      return false;
    }

    function updateAwayOffense(dt) {
      if (!awayCarrier) return;
      awayCarrier.walkCycle += dt * 12;
      awayCarrier.stun = Math.max(0, awayCarrier.stun - dt);

      const goalX = 75;
      const dodgeY = player.y > awayCarrier.y ? -0.45 : 0.45;
      const dx = goalX - awayCarrier.x;
      const dy = (H / 2 - awayCarrier.y) * 0.003 + dodgeY;
      const len = Math.hypot(dx, dy) || 1;
      awayCarrier.x += (dx / len) * awayCarrier.speed;
      awayCarrier.y += dy * awayCarrier.speed;
      awayCarrier.y = clamp(awayCarrier.y, 95, H - 45);

      // Away blockers follow the carrier
      for (const d of offense) {
        d.walkCycle += dt * 10;
        d.stun = Math.max(0, d.stun - dt);
        const tx = awayCarrier.x + rand(30, 130);
        const ty = awayCarrier.y + rand(-120, 120);
        d.x += (tx - d.x) * 0.025;
        d.y += (ty - d.y) * 0.025;
      }

      // Away blockers slow Brennan and Seattle defenders
      for (const d of offense) {
        const bdist = Math.hypot(player.x - d.x, player.y - d.y);
        if (bdist < 34 && player.dashTime <= 0 && player.invuln <= 0) {
          player.invuln = 0.35;
          const pushX = (player.x - d.x) / (bdist || 1);
          const pushY = (player.y - d.y) / (bdist || 1);
          player.x += pushX * 30;
          player.y += pushY * 30;
          spawnParticles(player.x, player.y, 5);
        }

        for (const mate of homeDefense) {
          const mdist = Math.hypot(mate.x - d.x, mate.y - d.y);
          if (mdist < 31 && mate.stun <= 0 && d.stun <= 0) {
            mate.stun = 0.35;
            d.stun = 0.25;
            const pushX = (mate.x - d.x) / (mdist || 1);
            const pushY = (mate.y - d.y) / (mdist || 1);
            mate.x += pushX * 18;
            mate.y += pushY * 18;
            spawnParticles(mate.x, mate.y, 4);
          }
        }
      }

      updateHomeDefense(dt);

      if (possession !== "away" || !awayCarrier) return;

      const dist = Math.hypot(player.x - awayCarrier.x, player.y - awayCarrier.y);
      const tackleRange = player.r + awayCarrier.r + 18;
      if (driveGrace <= 0 && dist <= tackleRange && messageTime <= 0) {
        message = "Press ENTER to tackle the QB!";
        messageTime = 0.35;
      }

      if (awayCarrier.x < 120) scoreTouchdown("away");
    }

    function update(dt) {
      if (state === "win") {
        stopAllAudio();
        playVictoryMusic();
        winCutscene.time += dt;
        if (!winCutscene.settled) {
          winCutscene.x = Math.min(winCutscene.targetX, winCutscene.x + 235 * dt);
          winCutscene.settled = winCutscene.x >= winCutscene.targetX;
        }
        return;
      }
      if (state === "kickoff") {
        updateKickoff(dt);
        return;
      }
      if (state === "extraPoint") {
        updateExtraPoint(dt);
        return;
      }
      if (state !== "play") return;
      quarterClock -= dt;
      if (quarterClock <= 0) {
        endDrive("Drive clock expired. Turnover!");
        return;
      }

      messageTime = Math.max(0, messageTime - dt);
      driveGrace = Math.max(0, driveGrace - dt);
      for (const p of [player, ...offense]) {
        p.invuln = Math.max(0, (p.invuln || 0) - dt);
        p.dashCooldown = Math.max(0, (p.dashCooldown || 0) - dt);
        p.dashTime = Math.max(0, (p.dashTime || 0) - dt);
      }

      if (snap.active) {
        updateSnap(dt);
        controlledPlayer.vx = 0;
        controlledPlayer.vy = 0;
        return;
      }

      if (pass.active) {
        updatePass(dt);
        controlledPlayer.vx = 0;
        controlledPlayer.vy = 0;
        // defenders and blockers keep moving while the ball is in the air
        if (possession === "home") {
          updateOffense(dt, homeBallCarrier, false);
          updateHomeOffense(dt);
        }
        return;
      }

      controlledPlayer = possession === "home" ? homeBallCarrier : player;
      let dx = 0, dy = 0;
      if (keys.has("ArrowLeft") || keys.has("a")) dx--;
      if (keys.has("ArrowRight") || keys.has("d")) dx++;
      if (keys.has("ArrowUp") || keys.has("w")) dy--;
      if (keys.has("ArrowDown") || keys.has("s")) dy++;
      const len = Math.hypot(dx, dy) || 1;
      const dashBoost = controlledPlayer.dashTime > 0 ? 2.2 : 1;
      controlledPlayer.vx = (dx / len) * controlledPlayer.speed * dashBoost;
      controlledPlayer.vy = (dy / len) * controlledPlayer.speed * dashBoost;
      controlledPlayer.x += controlledPlayer.vx;
      controlledPlayer.y += controlledPlayer.vy;
      controlledPlayer.x = clamp(controlledPlayer.x, 35, W - 40);
      controlledPlayer.y = clamp(controlledPlayer.y, 85, H - 35);
      
      // Troubleshooting player coordinates
      //if (player.x !== lastPlayerX || player.y !== lastPlayerY) {
          //console.log(
              //`Brennan -> X:${Math.round(player.x)} Y:${Math.round(player.y)}`
          //);
          
          //lastPlayerX = player.x;
          //lastPlayerY = player.y;
      //}
      
      if (Math.abs(controlledPlayer.vx) > 0.1) controlledPlayer.facing = Math.sign(controlledPlayer.vx);
      if (Math.abs(controlledPlayer.vx) + Math.abs(controlledPlayer.vy) > 0) controlledPlayer.walkCycle += dt * 12;

      if (possession === "home") {
        updateOffense(dt, homeBallCarrier, Math.abs(homeBallCarrier.vx) + Math.abs(homeBallCarrier.vy) > 0);
        if (ball.held) {
          ball.x = homeBallCarrier.x + 23;
          ball.y = homeBallCarrier.y + 2;
        }
        updateHomeOffense(dt);
      } else {
        if (awayCarrier) {
          updateOffense(dt, awayCarrier, true);
          if (ball.held) {
            ball.x = awayCarrier.x - 23;
            ball.y = awayCarrier.y + 2;
          }
        }
        updateAwayOffense(dt);
      }

      particles = particles.filter(p => p.life > 0);
      for (const p of particles) {
        p.life -= dt;
        p.x += p.vx;
        p.y += p.vy;
      }
    }

    function spawnParticles(x, y, count) {
      for (let i = 0; i < count; i++) {
        particles.push({ x, y, vx: rand(-4, 4), vy: rand(-4, 4), life: rand(.35, .9) });
      }
    }

    function drawParticles() {
      ctx.fillStyle = "#facc15";
      for (const p of particles) {
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function render() {
      if (state === "title") {
        playTitleMusic();
        drawTextScreen(
          "Pigskin Death Count",
          "Path to the Super Bowl"
        );

        // Flashing button to press enter at main screen
        if (Math.floor(flashTime * 2) % 2 === 0) {
          ctx.fillStyle = "#ffa500";
          ctx.font = "40px TypefaceMarioWorldPixelFilledRegular-Yz84q";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText("PRESS ENTER", W / 2, H - 120);
        }
        return;
      }

      if (state === "gameover") {
        stopAllAudio();
        drawTextScreen(
          "GAME OVER",
          `Seattle lost to ${teams[level].name}, ${homeScore}-${awayScore}`,
          "Press Enter to restart"
        );
        return;
      }

      if (state === "between") {
        stopAllAudio();
        playTitleMusic();
        drawTextScreen(
          "VICTORY",
          `Next up: 
           Seattle Vs. ${teams[nextLevelToStart].name}`,
          "Press Enter for next match"
        );
        return;
      }

      if (state === "win") {
        stopAllAudio();
        playVictoryMusic();
        drawField();

        const walking = !winCutscene.settled;
        const bob = walking ? Math.sin(winCutscene.time * 12) * 7 : 0;
        const playerW = 51;
        const playerH = 65;
        const playerX = winCutscene.x - playerW / 2;
        const playerY = H / 2 - playerH / 2 + 70 + bob;
        const trophyW = 32;
        const trophyH = 35;
        const trophyOffsetX = 30;
        const trophyOffsetY = -22;

        // Brennan carries the trophy above his leading hand as he enters.
        ctx.drawImage(brennanWinImage, playerX, playerY, playerW, playerH);
        ctx.drawImage(
            trophyImage,
            playerX + trophyOffsetX,
            playerY + trophyOffsetY,
            trophyW,
            trophyH
        );

        ctx.fillStyle = "rgba(0, 0, 0, .76)";
        ctx.fillRect(220, 42, 840, 78);
        ctx.fillStyle = "#facc15";
        ctx.font = "46px Nosifer";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("BRENNAN WINS THE SUPER BOWL!", W / 2, 84);

        if (winCutscene.settled && Math.floor(winCutscene.time * 2) % 2 === 0) {
          ctx.fillStyle = "rgba(0, 0, 0, .76)";
          ctx.fillRect(390, H - 92, 500, 52);
          ctx.fillStyle = "#ffffff";
          ctx.font = "25px Barrio";
          ctx.fillText("Play again? Press Enter", W / 2, H - 65);
        }
        return;
      }

      if (state === "extraPoint") {
        drawField();
        for (const kicker of extraPointPlayers) {
          drawFootballPlayer(
            kicker,
            kicker.team === "home" ? homeUniform : awayUniform(kicker),
            { scale: 1.15, star: kicker === extraPointPlayers[0] }
          );
        }
        drawBall(extraPointBall.x, extraPointBall.y);
        drawHUD();
        ctx.fillStyle = "rgba(0,0,0,.88)";
        ctx.fillRect(170, 92, 940, 64);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 26px Barrio";
        ctx.textAlign = "center";
        ctx.fillText(message, W / 2, 133);
        return;
      }

      if (state === "kickoff") {
        drawField();
        for (const kickoffPlayer of kickoffPlayers) {
          drawFootballPlayer(
            kickoffPlayer,
            kickoffPlayer.team === "home" ? homeUniform : awayUniform(kickoffPlayer),
            { moving: kickoffTime >= 0.65, scale: kickoffPlayer.number === "3" ? 1.15 : 1.0 }
          );
        }
        drawBall(kickoffBall.x, kickoffBall.y);
        drawHUD();
        ctx.fillStyle = "rgba(0,0,0,.88)";
        ctx.fillRect(220, 92, 840, 58);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 25px Barrio";
        ctx.textAlign = "center";
        ctx.fillText(message, W / 2, 130);
        return;
      }

      drawField();
      drawParticles();

      const drawQueue = [
        ...offense.map(p => ({ type: possession === "home" ? "homeMate" : "awayMate", p })),
        ...defenders.map(p => ({ type: possession === "home" ? "awayDef" : "awayBlocker", p })),
        ...homeDefense.map(p => ({ type: "homeDefense", p })),
        ...(awayCarrier ? [{ type: "awayCarrier", p: awayCarrier }] : []),
        { type: "player", p: player }
      ].sort((a, b) => a.p.y - b.p.y);

      for (const item of drawQueue) {
        if (item.type === "homeMate") {
          drawFootballPlayer(item.p, homeUniform, { moving: Math.abs(item.p.vx || 0) + Math.abs(item.p.vy || 0) > 0, star: item.p === controlledPlayer, scale: item.p.role === "RB" || item.p.role === "WR" ? 0.95 : 1.02 });
        }
        if (item.type === "awayMate" || item.type === "awayDef" || item.type === "awayBlocker") {
          drawFootballPlayer(item.p, awayUniform(item.p), { moving: item.p.stun <= 0, defender: item.p.stun > 0, scale: 1.02 });
        }
        if (item.type === "homeDefense") {
          drawFootballPlayer(item.p, homeUniform, { moving: item.p.stun <= 0, defender: item.p.stun > 0, scale: 1.02 });
          ctx.fillStyle = "rgba(0,0,0,.55)";
          ctx.font = "bold 10px Arial";
          ctx.textAlign = "center";
          ctx.fillText(item.p.role, item.p.x, item.p.y + 47);
        }
        if (item.type === "awayCarrier") {
          drawFootballPlayer(item.p, awayUniform(item.p), { moving: true, scale: 1.12 });
        }
        if (item.type === "player") {
          const alpha = player.invuln > 0 && Math.floor(performance.now() / 100) % 2 === 0 ? .55 : 1;
          drawFootballPlayer(player, homeUniform, { moving: Math.abs(player.vx) + Math.abs(player.vy) > 0, star: player === controlledPlayer, scale: 1.15, alpha });
        }
      }

      drawBall(ball.x, ball.y);
      drawHUD();

      if (messageTime > 0) {
        ctx.fillStyle = "rgba(0,0,0)";
        ctx.fillRect(220, 92, 840, 58);
        ctx.fillStyle = "rgba(255,255,255)";
        ctx.font = "bold 25px Barrio";
        ctx.textAlign = "center";
        ctx.fillText(message, W / 2, 130);
      }
    }

    function loop(timestamp) {
      const dt = Math.min(.033, (timestamp - lastTime) / 1000 || 0);
      lastTime = timestamp;

      if (state === "title") {
        flashTime += dt;
      } else {
        flashTime = 0;
      }

      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", e => {
      unlockAudio();
      keys.add(e.key);
      if (e.key === " " && state === "play") {
        tryBrennanTackle();
      } else if (e.key === "Enter" && ["title", "gameover", "between", "win"].includes(state)) {
        startGame();
      }
      if (e.key.toLowerCase() === "p" && state === "play") passBall();
      if (e.key.toLowerCase() === "k" && state === "extraPoint") kickExtraPoint();
      if (e.key === "j" && state === "play" && !snap.active && !pass.active && controlledPlayer.dashCooldown <= 0) {
        controlledPlayer.dashTime = .22;
        controlledPlayer.dashCooldown = .9;
        spawnParticles(controlledPlayer.x, controlledPlayer.y, 8);
      }
    });
    window.addEventListener("keyup", e => keys.delete(e.key));
    window.addEventListener("pointerdown", () => {
      unlockAudio();
      if (state === "title") playTitleMusic();
    });
    requestAnimationFrame(loop);
  </script>
</body>
</html>
